<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EmpTrack · Timekeeping System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f1a; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
    --accent: #00e5ff; --accent2: #ff4b6e; --success: #00e096; --warn: #ffd166;
    --text: #e8edf5; --muted: #5a7088;
    --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text); font-family: var(--font-mono);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 0 16px 80px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,229,255,0.025) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,229,255,0.025) 40px);
  }

  /* ══ HEADER ══ */
  header {
    width: 100%; max-width: 680px; padding: 36px 0 22px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border); margin-bottom: 32px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), #0077ff);
    border-radius: 11px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 0 22px rgba(0,229,255,0.3); flex-shrink: 0;
  }
  .logo-text h1 { font-family: var(--font-head); font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text p  { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .clock-wrap { text-align: right; }
  #live-time { font-size: 20px; font-weight: 500; color: var(--accent); letter-spacing: 1px; line-height: 1.2; }
  #live-date { font-size: 10px; color: var(--muted); letter-spacing: 0.8px; }

  /* gear button */
  #settings-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  #settings-btn:hover,
  #settings-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.07); }
  #settings-btn svg { width: 16px; height: 16px; transition: transform 0.4s; }
  #settings-btn.active svg { transform: rotate(60deg); }

  /* ══ SETTINGS PANEL ══ */
  #settings-panel {
    width: 100%; max-width: 680px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), margin-bottom 0.35s;
    margin-bottom: 0;
  }
  #settings-panel.open {
    max-height: 320px;
    margin-bottom: 20px;
  }
  .settings-card {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 18px; padding: 24px 28px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 32px rgba(0,229,255,0.08);
  }
  .settings-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.7;
  }
  .settings-title {
    font-family: var(--font-head); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .settings-title svg { width: 13px; height: 13px; }

  .url-input-wrap {
    display: flex; gap: 10px; align-items: stretch; margin-bottom: 12px;
  }
  .url-input-wrap input {
    flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 14px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text);
    letter-spacing: 0; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .url-input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
  .url-input-wrap input::placeholder { color: var(--muted); }
  .url-input-wrap input.has-value { border-color: rgba(0,229,255,0.4); }

  .btn-save-url {
    background: linear-gradient(135deg, var(--accent), #0077ff); color: #000;
    border: none; border-radius: 10px; padding: 11px 20px;
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-save-url:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-save-url:active { transform: scale(0.97); }

  .settings-status {
    font-size: 12px; min-height: 18px; display: flex; align-items: center; gap: 7px;
  }
  .settings-status.connected  { color: var(--success); }
  .settings-status.missing    { color: var(--warn); }
  .settings-status.saved      { color: var(--accent); }

  .url-hint {
    font-size: 11px; color: var(--muted); line-height: 1.6; margin-top: 10px;
  }
  .url-hint code {
    background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 4px; font-size: 10.5px;
  }

  /* ══ CARD ══ */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 30px; width: 100%; max-width: 680px; margin-bottom: 18px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.35;
  }
  .card-title {
    font-family: var(--font-head); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 20px;
  }

  /* ══ EMPLOYEE INPUT ══ */
  .input-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 22px; }
  label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  input#emp-num {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 18px; font-family: var(--font-mono); font-size: 20px; font-weight: 500;
    color: var(--text); width: 100%; letter-spacing: 3px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  input#emp-num:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.12); }
  input#emp-num::placeholder { color: var(--muted); letter-spacing: 1px; font-size: 14px; }

  /* ══ PUNCH BUTTONS ══ */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    padding: 15px; border: none; border-radius: 13px;
    font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.3px; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-in  { background: linear-gradient(135deg, var(--success), #00b574); color: #001a0f; box-shadow: 0 8px 22px rgba(0,224,150,0.22); }
  .btn-in:hover:not(:disabled)  { box-shadow: 0 8px 30px rgba(0,224,150,0.38); transform: translateY(-1px); }
  .btn-out { background: linear-gradient(135deg, var(--accent2), #c0003a); color: #fff; box-shadow: 0 8px 22px rgba(255,75,110,0.22); }
  .btn-out:hover:not(:disabled) { box-shadow: 0 8px 30px rgba(255,75,110,0.38); transform: translateY(-1px); }

  /* ══ STATUS MSG ══ */
  #status-msg {
    display: none; padding: 13px 16px; border-radius: 11px; font-size: 13px;
    margin-top: 14px; border: 1px solid transparent; animation: fadeIn 0.25s ease;
  }
  #status-msg.success { background: rgba(0,224,150,0.1); border-color: rgba(0,224,150,0.28); color: var(--success); }
  #status-msg.error   { background: rgba(255,75,110,0.1); border-color: rgba(255,75,110,0.28); color: var(--accent2); }
  #status-msg.loading { background: rgba(0,229,255,0.07); border-color: rgba(0,229,255,0.18); color: var(--accent); }
  .spinner {
    width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.55s linear infinite;
    display: inline-block; vertical-align: middle;
  }

  /* ══ LOG TABLE ══ */
  .log-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .badge {
    background: rgba(0,229,255,0.09); border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent); font-size: 10px; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px;
  }
  .log-table-wrap { overflow-x: auto; border-radius: 11px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface2); padding: 9px 13px; text-align: left;
    font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--muted); font-weight: 500; white-space: nowrap;
  }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td { padding: 10px 13px; color: var(--text); white-space: nowrap; }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .tag-in  { background: rgba(0,224,150,0.13); color: var(--success); }
  .tag-out { background: rgba(255,75,110,0.13); color: var(--accent2); }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .empty-state { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; line-height: 1.6; }

  .btn-refresh {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 13px; border-radius: 8px; font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; transition: color 0.18s, border-color 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { color: var(--accent); border-color: var(--accent); }
  .btn-refresh svg { width: 11px; height: 11px; }

  /* ══ ANIMS ══ */
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  /* ══ MOBILE ══ */
  @media (max-width: 500px) {
    .card { padding: 20px 16px; }
    .settings-card { padding: 20px 18px; }
    .btn-row { grid-template-columns: 1fr; }
    header { padding: 24px 0 18px; }
    #live-time { font-size: 17px; }
    .url-input-wrap { flex-direction: column; }
    .btn-save-url { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo-icon">⏱</div>
  <div class="logo-text">
    <h1>EmpTrack</h1>
    <p>Timekeeping System</p>
  </div>
  <div class="header-right">
    <div class="clock-wrap">
      <div id="live-time">--:--:--</div>
      <div id="live-date">Loading…</div>
    </div>
    <!-- Settings gear button -->
    <button id="settings-btn" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                 l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4
                 h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06
                 A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
                 a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                 a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</header>

<!-- ══ SETTINGS PANEL ══ -->
<div id="settings-panel">
  <div class="settings-card">
    <div class="settings-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      Google Sheets Connection
    </div>

    <div class="url-input-wrap">
      <input type="text" id="webapp-url-input"
             placeholder="Paste your Apps Script Web App URL here…"
             autocomplete="off" spellcheck="false"/>
      <button class="btn-save-url" onclick="saveWebAppUrl()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Save
      </button>
    </div>

    <div class="settings-status" id="settings-status">
      <!-- filled by JS -->
    </div>

    <div class="url-hint">
      Get this URL from Google Apps Script → <code>Deploy</code> → <code>New deployment</code> → <code>Web App</code>.
      It looks like: <code>https://script.google.com/macros/s/…/exec</code>
    </div>
  </div>
</div>

<!-- ══ PUNCH CARD ══ -->
<div class="card">
  <div class="card-title">Employee Time Entry</div>
  <div class="input-group">
    <label for="emp-num">Employee Number</label>
    <input type="text" id="emp-num" placeholder="e.g. EMP-001" maxlength="20"
           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  </div>
  <div class="btn-row">
    <button class="btn btn-in"  id="btn-in"  onclick="submitLog('IN')">
      <span>▶</span> Time In
    </button>
    <button class="btn btn-out" id="btn-out" onclick="submitLog('OUT')">
      <span>■</span> Time Out
    </button>
  </div>
  <div id="status-msg"></div>
</div>

<!-- ══ TODAY'S LOGS ══ -->
<div class="card">
  <div class="log-header-row">
    <div class="card-title" style="margin-bottom:0">Today's Time Logs</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="badge" id="log-count">— entries</span>
      <button class="btn-refresh" onclick="loadTodayLogs()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
  <div style="margin-top:14px">
    <div class="log-table-wrap">
      <table>
        <thead>
          <tr><th>Employee #</th><th>Type</th><th>Time</th><th>Date</th></tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="4"><div class="empty-state">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  URL is stored in localStorage — no hardcoding needed.
// ═══════════════════════════════════════════════════════
var STORAGE_KEY = 'emptrack_webapp_url';

function getWebAppUrl() {
  return (localStorage.getItem(STORAGE_KEY) || '').trim();
}

// ── Settings panel toggle ──────────────────────────────
function toggleSettings() {
  var panel = document.getElementById('settings-panel');
  var btn   = document.getElementById('settings-btn');
  var isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) {
    // Populate input with current saved URL
    document.getElementById('webapp-url-input').value = getWebAppUrl();
    refreshSettingsStatus();
  }
}

// ── Save URL from settings input ───────────────────────
function saveWebAppUrl() {
  var val = document.getElementById('webapp-url-input').value.trim();
  if (!val) {
    setSettingsStatus('⚠ Please paste your Web App URL first.', 'missing');
    return;
  }
  if (!val.startsWith('https://script.google.com/')) {
    setSettingsStatus('⚠ That doesn\'t look like a valid Apps Script URL. It should start with https://script.google.com/', 'missing');
    return;
  }
  localStorage.setItem(STORAGE_KEY, val);
  document.getElementById('webapp-url-input').classList.add('has-value');
  setSettingsStatus('✓ URL saved! Connection is active.', 'connected');

  // Auto-close panel after short delay and reload logs
  setTimeout(function() {
    document.getElementById('settings-panel').classList.remove('open');
    document.getElementById('settings-btn').classList.remove('active');
    loadTodayLogs();
  }, 1200);
}

function refreshSettingsStatus() {
  var url = getWebAppUrl();
  if (url) {
    document.getElementById('webapp-url-input').classList.add('has-value');
    var short = url.length > 55 ? url.substring(0, 52) + '…' : url;
    setSettingsStatus('✓ Connected: ' + short, 'connected');
  } else {
    document.getElementById('webapp-url-input').classList.remove('has-value');
    setSettingsStatus('⚠ No URL saved yet. Paste your Web App URL above.', 'missing');
  }
}

function setSettingsStatus(msg, cls) {
  var el = document.getElementById('settings-status');
  el.textContent = msg; el.className = 'settings-status ' + cls;
}

// ── JSONP transport ────────────────────────────────────
var _seq = 0;
function jsonp(params) {
  var url = getWebAppUrl();
  return new Promise(function(resolve, reject) {
    if (!url) { reject(new Error('no_url')); return; }

    var cbName = '__et' + (++_seq);
    var timer  = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, 15000);

    function cleanup() {
      try { delete window[cbName]; } catch(e) {}
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
    }

    window[cbName] = function(data) { clearTimeout(timer); cleanup(); resolve(data); };

    var allParams = Object.assign({}, params, { callback: cbName });
    var qs = Object.keys(allParams)
      .map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(allParams[k]); })
      .join('&');

    var s = document.createElement('script');
    s.id  = cbName;
    s.src = url + '?' + qs;
    s.onerror = function() { clearTimeout(timer); cleanup(); reject(new Error('load_error')); };
    document.head.appendChild(s);
  });
}

// ── Live clock ─────────────────────────────────────────
function updateClock() {
  var now = new Date();
  document.getElementById('live-time').textContent =
    now.toLocaleTimeString('en-PH', { hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('live-date').textContent =
    now.toLocaleDateString('en-PH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
updateClock(); setInterval(updateClock, 1000);

// ── Date / time strings ────────────────────────────────
function todayStr() {
  var n = new Date();
  return String(n.getMonth()+1).padStart(2,'0') + '/' +
         String(n.getDate()).padStart(2,'0') + '/' + n.getFullYear();
}
function timeStr() {
  return new Date().toLocaleTimeString('en-PH',
    { hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ── Status banner ──────────────────────────────────────
function showStatus(html, cls) {
  var el = document.getElementById('status-msg');
  el.innerHTML = html; el.className = cls; el.style.display = 'block';
  if (cls === 'success') setTimeout(function(){ el.style.display='none'; }, 4500);
}

// ── Submit punch ───────────────────────────────────────
async function submitLog(type) {
  var empNum = document.getElementById('emp-num').value.trim().toUpperCase();
  if (!empNum) { showStatus('⚠ Please enter your Employee Number.', 'error'); return; }

  if (!getWebAppUrl()) {
    showStatus('⚠ Google Sheets not connected. Tap the <strong>⚙ gear icon</strong> in the top right to add your Web App URL.', 'error');
    return;
  }

  var btnIn  = document.getElementById('btn-in');
  var btnOut = document.getElementById('btn-out');
  btnIn.disabled = btnOut.disabled = true;
  showStatus('<span class="spinner"></span> &nbsp;Recording Time ' + type + '…', 'loading');

  try {
    var result = await jsonp({ action:'log', empNum:empNum, type:type, date:todayStr(), time:timeStr() });
    if (result && result.status === 'success') {
      showStatus('✓ Time ' + type + ' recorded for <strong>' + escHtml(empNum) + '</strong> at ' + escHtml(result.time), 'success');
      document.getElementById('emp-num').value = '';
      setTimeout(loadTodayLogs, 800);
    } else {
      showStatus('✗ ' + (result ? escHtml(result.message) : 'Unknown server error.'), 'error');
    }
  } catch(e) {
    if (e.message === 'no_url') {
      showStatus('⚠ No Web App URL saved. Open Settings (⚙) to connect Google Sheets.', 'error');
    } else {
      showStatus('✗ Could not reach Google Sheets. Check your internet connection.', 'error');
    }
  } finally {
    btnIn.disabled = btnOut.disabled = false;
  }
}

// ── Load today's logs ──────────────────────────────────
async function loadTodayLogs() {
  if (!getWebAppUrl()) {
    document.getElementById('log-body').innerHTML =
      '<tr><td colspan="4"><div class="empty-state">' +
      '⚙ Open <strong>Settings</strong> (gear icon, top right)<br>and paste your Web App URL to connect Google Sheets.' +
      '</div></td></tr>';
    document.getElementById('log-count').textContent = '— entries';
    return;
  }
  try {
    var result = await jsonp({ action:'getLogs', date:todayStr() });
    renderLogs(result && result.logs ? result.logs : []);
  } catch(e) {
    document.getElementById('log-body').innerHTML =
      '<tr><td colspan="4"><div class="empty-state">⚠ Could not load logs. Click Refresh to try again.</div></td></tr>';
  }
}

// ── Short time display: "08:01 AM" from full time string ──
function shortTime(timeVal) {
  // timeVal may be "08:01:32 AM" or any locale string — parse and reformat
  try {
    var d = new Date('1970-01-01 ' + timeVal);
    if (isNaN(d)) return timeVal; // fallback: return as-is
    return d.toLocaleTimeString('en-PH', { hour12:true, hour:'2-digit', minute:'2-digit' });
  } catch(e) { return timeVal; }
}

// ── Render log rows ────────────────────────────────────
function renderLogs(logs) {
  var tbody = document.getElementById('log-body');
  var count = logs.length;
  document.getElementById('log-count').textContent = count + ' entr' + (count===1?'y':'ies');
  if (!count) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No punches recorded today yet.</div></td></tr>';
    return;
  }
  tbody.innerHTML = logs.slice().reverse().map(function(row) {
    var isIn = (row.type === 'IN');
    return '<tr>' +
      '<td><strong>' + escHtml(row.empNum) + '</strong></td>' +
      '<td><span class="tag tag-' + (isIn?'in':'out') + '"><span class="dot"></span>' +
        (isIn?'Time In':'Time Out') + '</span></td>' +
      '<td>' + escHtml(shortTime(row.time)) + '</td>' +
      '<td>' + escHtml(row.date) + '</td>' +
      '</tr>';
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key = Time In
document.getElementById('emp-num').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitLog('IN');
});

// ── On load: open settings automatically if no URL saved ──
(function init() {
  var url = getWebAppUrl();
  if (!url) {
    // Auto-open settings panel so admin sees it right away
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('settings-btn').classList.add('active');
    setSettingsStatus('⚠ No URL saved yet. Paste your Web App URL above.', 'missing');
  }
  loadTodayLogs();
})();
</script>
